<body>
    
    <header>
        <div class="logo">
            <img src="favicon/favicon-v2.png">
            <h1>Home Page</h1>
        </div>
        <nav>
            <ul class="nav-links" id="nav-links">
                <li ><a id="mark" href="index.html">Home</a></li>
                <li><a href="discover.html">Discover</a></li>
                <li><a href="directory.html">Directory</a></li>

                <button class="btn">Join</button>
            </ul>
            
            <div class="hamburger" id="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </nav>
    </header>

    <main>
        <div class="hero">
            <h1>Chamber of Commerce</h1>
            <p>Explore the directory of local businesses and members of the Chamber of Commerce</p>
        </div>

        <section class="data-cards">
            <h2>Home</h2>
            <div class="event">
                <h3>Event</h3>
                <ul>
                    <li></li>
                </ul>
            </div>
        
            <div class="weather">
                <h2>Current Weather</h2>
                <div class="weather-info">
                    <img id="weatherIcon" src="" alt="Weather Icon">
                    <p id="currentTemp"></p>
                    <p id="captionDesc"></p>
                    <p id="weatherCondition"></p>
                    <p id="windSpeed"></p>
                    <p id="humidity"></p>
                    <p id="sunrise"></p>
                    <p id="sunset"></p>
                    <div id="weather-spotlight-cards"></div>
                </div>
            </div>
            
            <div class="forecast">
                <h2>3-Day Forecast</h2>
                <div id="forecast-cards">
                    <!-- Forecast cards will be dynamically inserted here -->
                </div>
            </div>
        </section>

        <!-- Company Spotlights -->
        <section id="spotlight">
            <h2>Member Spotlights</h2>
            <div id="spotlight-cards"></div>
        </section>
    </main>

    <footer>
        <p>&copy; <span id="currentyear"></span>Chamber of Commerce | Irie Judicael Elvis | WDD 231</p>
